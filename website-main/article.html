            "monte-charles": {
                title: "Monte Charles",
                subtitle: "Charles Leclerc Vince il Gran Premio Di Monaco !",
                image: "assets/images/monaco.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `There are fewer milestones in a Formula One driver’s career more meaningful and touching than a race win on home soil. This perhaps rings even truer in the case of monégasque Charles Leclerc, who from childhood seldom missed a Monaco Grand Prix, following with a tight heart and sparkly eyes as the red car zoomed past the Monte Carlo circuit, dreaming of one day being in one of the single seaters to make its dance down the Mediterranean streets.

At 19 years-old and now a Formula 2 driver, Charles Leclerc told a white lie to his father two days before the latter’s passing: that he’d made it to Formula One. Unbeknownst to him, this lie would come true a month later when he signed with Sauber for his debut season in the sport.

In the years to follow, the infamous “Monaco curse” that has foiled Leclerc’s chances at his home race saw him facing a DNF three years in a row followed by a DNS, a crash, a pole-turned P4 due to bad strategy calls, and a P6 in 2023. Stepping into the Monaco Grand Prix Weekend, Ferrari —now under the leadership of freshly-appointed team principal Fred Vasseur— knew well enough that a good result would not only break the alleged curse and allow Leclerc to achieve another significant milestone in his career, but would be the sign the scuderia needs to be certain that the team’s restructuring operation is heading in the right direction.

Saturday’s qualifying results planted the seed of hope in the hearts of Ferrari and Tifosi alike, that this third attempt at a Monaco pole-converted-win might finally be the triumphant one. With honour, hope, and a title fight on the line, Leclerc lined his vehicle at the front of the pack ahead of the five red lights; the entire municipality of Monaco held its breath while the lights went out for a solemn moment, save for the rhythmic sounds of the engines roaring crashing against the harbour's waves, in sync with the heartbeat of all whose eyes were glued to the red car.

The first lap did not disappoint in the mayhem department, culminating in a red flag before the final car crossed the finish line due to 3 simultaneous accidents across the field: Checo Perez’ Red Bull coming undone after meeting the wall due to a coming together with Kevin Magnussen at the back of the field, Esteban Ocon attempting to overtake his teammate Pierre Gasly for the final points position —a sudden and unexpected move that ended with the latter rear ending his car—, and Carlos Sainz attempting an overtake on Oscar Piastri for second place, leaving the former with a puncture that had him limping to the pit lane under the red flag.

Despite this pandemonium, race leader Leclerc remained level-headed, leading from the race restart until the chequered flag with ease, nursing his tyres and dictating the pace as needed. The emotions culminated to a climax as he neared the finish line to “bring it home” in every meaning of the phrase. Leclerc explained in a post race interview that in those finals laps, he especially thought of his father and that white lie.

Now, 26 years old, Charles has not only achieved his and his father’s dream by making it to Formula One, but has realised the aspiration of every citizen of the Monaco Municipality who have long dreamed of seeing one of their own crowned on the Monte Carlo streets. And what a moment it was for Leclerc who carried to the top step not only the pride of him and his family, but that of Ferrari, Italy, the Tifosi, and Monaco. 

Dedicating the win to his late father Hervé, and his late godfather Jules Bianchi, tears did little to show how much the victory meant for Charles: the 26 year-old face of Ferrari and Formula 1 but more importantly, the little boy with sparkly eyes who followed the red car with delight not knowing it would come to bear his number and his honour.

A result 1 year, 10 months, and 16 days in the waiting, this win assured the team that the mistakes that defined their past few seasons are a thing of the past, and that their objective to steer the ship Ferrari in its rightful path towards glory is well underway, with Leclerc as the rightful captain.

`
            },
            "op1": {
                title: "OP1",
                subtitle: "Oscar Piastri Clutches his first win - the first of many !",
                image: "assets/images/OP1.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `504 days since he first saw the chequered flag as a Formula One driver, Oscar Piastri comes home to claim that very flag, earning his first Grand Prix win on but his 35th attempt.

After a more than promising 2023 debut season with McLaren that culminated in 2 podium finishes, 2 fastest laps, and a ninth place in the drivers’ championship, Piastri confidently cemented himself as a powerful rookie on par with the seasoned drivers he drove alongside, never shying from on-track battles and always keeping a calm and collected mindset when the need arose. 

At the dawn of the new season, the Aussie returned for a second year with the Woking-based team, determined to prove his status as a rising star in the sport. And prove he did, collecting points at every single race weekend of the season so far, consistently qualifying and finishing close to experienced teammate Lando Norris. With a performance that has been nothing short of consistent and confident, it has become clear that Piastri has no intention to deny himself the opportunity to fight for his own triumphs against his older teammate, and that proved to be the case today at the Hungarian Grand Prix. Sharing the front row with the other McLaren of Lando Norris, Piastri got the better launch at the race start, enduring a three-car tussle involving the former and Verstappen and coming out unscathed with the race lead and Norris following closely behind. 

As was the case in Silverstone, McLaren would prioritise Norris in terms of team strategy, calling him first to the pits with the intention of protecting from third place holder Hamilton who was steadily closing in —a decision that resulted in Norris successfully performing an undercut on his teammate and grasping the race lead by lap 50. What ensued was an intra-team negotiation over Norris giving the position back to Piastri after both McLarens were safely away from any external threat, at which point Norris stated that he believes Piastri should fight to overtake him for the position —whether he said this aware that the team strategy had jeopardised Piastri’s lead or not is left to be speculated. 

With two laps left until the end of the race, Norris decided to put the team’s success before his own and conceded the race lead to Piastri, staying in close vicinity until the end of the race where the latter emerged first to greet the chequered flag, claiming his first Grand Prix race win, and leading McLaren’s first 1-2 finish since Monza 2021.

Skilled beyond his years and only in the second of his F1 career, Oscar Piastri continues to amaze with a performance that could hardly be attributed to a rookie of his experience. With the highly competitive single-seater that the team have provided him with this season under him and the fierce competition of his teammate nothing but a motivator for the steel-willed Aussie, this is sure to be but the first of many wins to crown the young man’s outstanding racecraft and champion mentality. 
`
        },
            "LLO-sainz": {
                title: "Paddock Star, Williams Bound",
                subtitle: "Sainz finalizes his choice of team after being the season's diamond",
                font: "'Playfair Display', serif",
                image: "assets/images/sainz.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `<i>Dearest Gentle reader</i>,

Have you missed me ? I dearly hope you were not under the impression that far too much time would pass without hearing from your favourite gossip monger. In the weeks we have been apart, I have not rested, to be sure. For you see —like all of you, my dearest members of the paddock— I have been keeping a set of close eyes and perked ears on the comings and goings amongst our paddock, and I come forth today bearing nothing short of exciting news and scrumptious rumours regarding an announcement made by a certain driver who has been spared the attention of none since the start of this season: Mister Carlos Sainz. 

It has come to this author's attention —as I am certain it has to your collective consciousness— that Mister Sainz has at last extracted the veil of mystery from his future whereabouts on the grid, and his destination has avered as none other than the Williams team. As this is undoubtedly a most curious of announcements, let us take a path on the journey that has led us to this fateful day, and unearth what factors might have influenced this driver's decision —and, perhaps, whether they lied within his control or not.

There is not a conscience amongst us that does not bear a recollection of the fateful day where we came to know of Sainz' departure from Scuderia Ferrari: a team that had housed him for the past three years but had ultimately set their sights on Sir Lewis Hamilton to accompany their star driver Charles Leclerc on the race track for the 2025 season and onwards. The reactions to this on dit ranged from glee and excitement for the new pairing to what can only be described as a dizzying mix of pity and intrigue for the Spaniard who had been the first witness —or, for lack of better word, victim— of how the deck would be shuffled on this here silly season.

<b>A comet on the radar</b>

With no clear destination on his ticket, the start of the season signalled takeoff for Sainz, who only bore one goal in mind: to prove himself a worthy asset to any top team who would have the fortune of signing him. To be sure, this author's curious eyes followed his trajectory, and my thirst for knowledge has uncovered no lack of context for the events to unfold in the time from then until now.

As it stood, the beginning of Carlos’ season was nothing short of smooth sailing with 3 consecutive podium finishes, save for one weekend where an urgent appendix removal procedure saw him ceding his single seater to rising star Ollie Bearman. In what can only be described as an impressive return to the tracks, Sainz would stand on the top step at the Australian Grand Prix 14 days after his operation, a fact that only added to the praise attributed to his performance down under. To be sure, for the first month of the season, he seldom found himself deprived of praises that compared his talent —or at times, deemed it superior— to the likes of Schumacher, Senna, Rosberg, and Button. Even further, questions began to be raised on the origin and nature of Ferrari's decision: had they —as so commonly iterated— "fired the wrong driver", and had their announcement really been equipped with as much foresight as had been initially believed ?

<b>Icarus too burns</b>

It can often be the case that a rise to the stars, if not undertaken with the utmost care, should end too close to the sun. And for Sainz who had once been declared a season’s diamond of sorts, the race weekends continued to unfold before our very eyes and with them, so did the turbulence. An incident at the Chinese sprint race saw him running his teammate off the track in an attempt to overtake, one that put the condition of both drivers' single-seaters and races at risk. The commentary box took swift notice of the unsafe manoeuvre, quickly followed by the agreement that no action would surely be pursued, as that would do nothing but add insult to injury for the team.

This would sadly —and rather unsurprisingly, one would argue— not be the last time controversy would befall the team. For it was at the Spanish Grand Prix that Sainz committed to a third lap overtake that granted the position on his end, but not without damage to Leclerc's front wing that ultimately cost him a podium finish. Displeased with the former’s actions, Leclerc explained that both drivers were instructed to manage their tyres at the crucial first stint, adding: “I guess he wanted to impress at his home race, [...] do something spectacular, considering the moment in his career”. On the other end of the media pen was Sainz, asserting that he had no fault in the incident: “For me it was clear, we had a new soft and we had to attack. I don't know what happened to him in the first lap, but I couldn't stay behind him all my life [...] I don't know what he's complaining about this time.” 

Be it slander or sportsmanship, there is but one certainty to come of this kerfuffle —Leclerc’s characteristic daring and adaptive style presents itself as nothing if not in stark contrast to Sainz’ aggressive and strategic one. Whether or not this fact influenced the team’s decision when it came to curating their driver lineup is not this author's story to tell. What I can be certain about, however, is that some urgent talks were surely had chez Ferrari to avoid similar incidents for the rest of the season, especially with Leclerc presenting the team's most powerful and likely contender for a championship battle —even with the team's resistance to enforcing a number one driver policy as shown in the orders that ushered Sainz to victory at the Australian feature.

Putting aside any controversy that may suggest an imminent power struggle at the home of the prancing horse, Mister Sainz would ultimately fail to rise to the standard set by his starting performance, despite being —for the most part— graciously spared of the infamous issues that notoriously never fail to foil his teammate's races. For it is no secret that it is often Leclerc —whose "bad luck" has branded itself as a wicked calling card of sorts— who most often mysteriously finds himself at the receiving end of a flawed strategy call or mechanical issue, for one reason or the other. To the untrained eye, it may almost seem as if Sainz finds no issue with the team's results and that he is satisfied with fourth or fifth place finishes that "save the day" for the developing team, a tune earths apart from Leclerc's who seldom echoes satisfaction with anything but first place.

<b> Stick The landing </b>

With the months passing, so did the Sainz craze that flew through the paddock. Rumours of Red Bull and Mercedes contracts were still in the air, but as the soft spring breeze settled for summer heat, these on dits were replaced by a different conjecture, that Sainz had begun modestly setting his sights on the likes of Alpine, Williams, and Sauber. 

It cannot be overlooked that the care with which Sainz took to making his decision did not come without dire consequences to his fellow drivers. As he mulled over his choices and weighed his options en attente of an offer to satisfy his demands as a young driver in the prime of his career, others were hung out to dry as their teams put a halt on contract negotiations to present their own enticing offers for Sainz' choosing. Surely enough, a handful of drivers such as Valtteri Bottas and Zhou Gyuanyu have voiced their concerns, placing into question the reasons behind Sainz' soaring popularity across the driver market and their subsequent struggles. What was their diagnosis, you may ask ? You will be pleased to know they spared no amount of ambiguity, chalking it down to —besides Sainz’ impressive career and points tally that have certainly made him a most coveted driver, to be sure— a host of unnamed factors beyond performance and racecraft; I will leave it to you, my dearest readers, to label these reasons following your inclinations.

Where we stand now, it appears Sainz has made his choice and placed his trust in the Williams team for the years to come. With this announcement came its own collective of theories: a salary with more zeros than years Sainz has spent in the sport altogether; blueprint for a powerful car that will see Williams flying through the field with the Spaniard as their captain, an exit clause that can see him jumping ship to Mercedes or Red Bull if he is offered —although this author must say I find this theory to be quite distasteful, and can only hope that such an undignifying conjecture was not entertained.

When all is said and done, we must now do nothing but wish the best for Mister Sainz as he embarks on his new journey. It also would not hurt a soul if we were to weigh the opportunities this announcement has created —or in some cases, terminated— across the grid: who do you reckon, my dearest of readers, will be the next tale to set our paddock abuzz ? If anyone should bravely uncover the parameters of such exciting news, it is none other than I. 

<i>Yours truly,
Lady LightsOut.</i>
`
            }
            ,"LLO-silver-war": {
                title: "The Silver War Anew",
                subtitle: "Lady LightsOut Returns to report on the befuddling rivalry between the two Mercedes drivers",
                image: "assets/images/kimi-george.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                font: "'Playfair Display', serif",
                content: `<i>Dearest Gentle Reader,</i>

My return to these pages has been long overdue, do you not agree? This author has spent some time away from society's gaze, occupied by reflection and repose. Yet fear not, for she has returned to her post, quill in hand, ready to report upon the happenings of our most illustrious paddock with all the diligence and occasional indiscretion that such affairs deserve.

For those who have somehow managed to remain unaware of the latest drama, it would appear that the Silver War has once again graced our circuits. Tensions continue to simmer within the Mercedes camp as its two drivers alternate between camaraderie and competition. But, as with all rivalries worth discussing, matters would come to a head at the ever-fateful Canadian Grand Prix.

<b>Sprint Race Mania</b>

During the sprint race, the Mercedes pair engaged in a spirited battle for supremacy, trading first and second place with all the subtlety of debutantes vying for the attention of the season's most eligible bachelor. George Russell briefly found himself off track, while Kimi Antonelli paid several visits to the grass as the two alternated between defending and attacking.

On lap six, young Antonelli locked up and ventured onto the grass once more, opening the door for Lando Norris to inherit second place. To this, the Italian could only protest, "That was very naughty." A most amusing choice of words for a racing driver. Team principal Toto Wolff was swift to intervene, instructing his young charge, "Kimi, focus on the driving and not on the radio moaning." One cannot help but admire the candour.

<img src="assets/images/canada-merc.png" alt="Canada Mercedes" width=100% align="center">

As the sprint neared its conclusion, Antonelli launched another ambitious attempt at Norris, only to find himself once again in the run-off area. If nothing else, this author finds the move to be evidence of his relentless determination, perhaps accompanied by the sort of impatience that so often accompanies youth. At merely nineteen years of age, caution appears to be a virtue still under consideration.

The sprint ultimately concluded with Russell victorious, Norris second, and Antonelli forced to settle for third. Some might argue that the Italian could have secured second place had he shown greater restraint. Yet others may wonder whether restraint has ever truly been the currency of great racing drivers. After all, is not the willingness to chase every opportunity—however improbable—the very essence of the sport?

Indeed, Antonelli's reputation has already been built upon such daring. This author need only remind readers of his audacious Eau Rouge overtake in treacherous wet conditions, a manoeuvre many deemed impossible. If there exists a driver willing to gamble on the impossible becoming possible, it is surely him.

<b>Sunday's Best</b>

Come Sunday, tensions between the Mercedes teammates had become impossible to ignore. With a front-row lockout secured, all signs pointed toward an afternoon rich in entertainment.

At lights out, however, it was Lando Norris who seized the initiative, sweeping into the lead and leaving the Silver Arrows to squabble amongst themselves. Antonelli settled into second place, with Russell tucked closely behind. Yet fortune, as it so often does, proved fickle. An unfortunate tyre strategy would eventually demote Norris down the order, restoring Mercedes to prominence.

On lap six, Russell executed an overtake that left his teammate locking up and perilously close to making contact. By lap twelve, Antonelli would briefly claim the position from Russell, only for the Briton to reclaim it almost immediately. One might have mistaken the pair for dance partners, were it not for the distinctly passive-aggressive nature of their choreography.

The exchanges continued lap after lap, each refusing to yield an inch. Then came lap thirty.

Russell suddenly found himself on the grass before pulling his car to the side of the circuit with apparent technical troubles. His disappointment was impossible to miss, expressed most vividly through the rather dramatic disposal of his headrest. One suspects it shall not be remembered as his finest moment of composure.

<img src="assets/images/george-canada.jpg" alt="George upset" width=100% align="center">

Yet while the Englishman's frustrations were considerable, they were swiftly eclipsed by the jubilation unfolding elsewhere. On the podium stood Lewis Hamilton, Max Verstappen, and Kimi Antonelli. There were embraces, champagne showers, and even the ceremonial lifting of the young Italian into the air—an honour usually reserved for victorious heroes and beloved younger siblings.

The fans, naturally, were delighted. Social media quickly proclaimed it the "best podium ever," while others celebrated what they described as a "Verstappen-Hamilton redemption arc." Such declarations may be dramatic, but for once this author finds herself inclined to agree. Each driver delivered a remarkable performance worthy of celebration.

<img src="assets/images/canada-podium.jpg" alt="Canada Podium" width=100% align="center">

Returning, however, to the matter of our Silver Arrows, it would seem that the source of their growing rivalry lies deep within their contrasting approaches to racing. Russell is known for his opportunistic aggression, rarely hesitant to attack when track position is at stake. Antonelli, meanwhile, remains wonderfully reckless in the way only youth permits, still learning Formula One's many unwritten rules. His style has often been compared to that of Verstappen: fearless, relentless, and perpetually hungry for more.

And so, despite the kerfuffle that was the Canadian Grand Prix, one thing remains abundantly clear: these two gentlemen form a most compelling partnership. Whether they continue as teammates or evolve into full-fledged rivals, their battles promise to provide society with no shortage of entertainment.

And what, dear reader, could possibly be more delightful than that?

<i>Yours truly,
Lady Whistledown</i>

`
            }
            ,"OB87": {
                title: "Lights On Ollie Bearman",
                subtitle: "We shine a light on Jeddah's Super sub, the bimbo della rossa",
                image: "assets/images/oliver-bearman.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `If there ever were a young driver who stunned at their debut and left millions speechless, it would be Oliver Bearman. The Essex-native made such a great impression that he became an icon of Ferrari, affectionately nicknamed as “el bimbo della rossa” (the kid of the red car" (or "the red team")).

No one can imagine the pressure Bearman felt when he got the call on Saturday Afternoon that he would be filling in for an appendicitis-ridden Sainz and jumping into his first F1 session ahead of expected time. The young Brit struggled at first with the G-forces and sheer speed, which were miles apart from those of a Formula 2 car.

And yet the young Essex-native entered qualifying cool as a cucumber, scoring a Q2 time 0.036s away from knocking Lewis Hamilton out of contention. He then went on to make some impressive overtakes on Sunday night and ended the night in 7th place on debut, a most impressive result.

He was swiftly picked up by Haas, who signed him for the 2025 season and forth, where he would officially begin his Formula One career.

His performance has then only been improving throughout the seasons:
- 2024: 18th in the standings with his solitary entry in the Saudi Arabian GP
- 2025: 13th, with consistent results and the occasional stunner, such as two 6th-place finishes and a 4th-place finish in Mexico City. 
- 2026: Currently sits 9th in the standings, scoring the majority of his team’s points and showing solid results weekend in and weekend out.

Although the limits of his car don’t allow Bearman to show his full potential most of the time, he is surely a talent to keep watching, and his debut performance more than showed that he is capable of working brilliantly under pressure and foreign conditions.
`
            }
            ,"monaco-practice": {
                title: "Chasing the Apex",
                subtitle: "Everything you missed from the chaotic practice sessions in Monaco.",
                image: "assets/images/monaco-fppp.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `As the Friday sun warms the streets of Monte Carlo and the harbor echoes with the music of the Mediterranean, the garages lift their shutters. The most glamorous weekend in motorsport is officially underway with Friday free practice.
                <b>FP1: Red Flags and Pre-Race Hype</b>
The opening session immediately reminded everyone how unforgiving the Monaco barriers can be, as Red Bull youngster Isack Hadjar suffered an early crash, triggering a red flag that brought a premature halt to the running.

When the dust settled, Ferrari locked out the top spots ahead of Max Verstappen and the Mercedes duo. The result added an intriguing twist to the pre-weekend mind games. Earlier, Charles Leclerc had confidently stated: "If there is a track where I will bet on us, it’s Monaco." Yet, he still cautiously labeled Mercedes as "the team to beat."

Meanwhile, Lewis Hamilton completely brushed off the favorite tags. "I'm not listening to any of the hype," Hamilton insisted, coming off a strong podium in Canada. "There are no certainties in F1. We're just trying to take the learnings from each weekend and try to move forward."

<b>FP2: Ferrari keeps up the pace</b>
The afternoon session began as a typical data-gathering exercise with teams cycling through different tire compounds. However, Monaco's peace is always fragile. McLaren’s Lando Norris was forced to stop on track at Turn 10 due to a suspected battery issue, forcing the marshals into action and bringing out another red flag.

Once track action resumed, Lewis Hamilton backed up his team's potential by rocketing to the top of the timesheets. The other Ferrari remained hot on his heels, while Max Verstappen held steady in third.

For Hamilton, the car's performance feels like night and day compared to a "miserable" 2025 campaign in Monaco. He credited his growing comfort to a stronger bond with his crew:

"We're working really well together. I've got the right engineers that I need now... I feel like I've obviously had input in this year's car and it's moving in the direction that I particularly like. These things take time, but we've still got a lot of work going forward. It's not a given that we're going to be competitive everywhere we go."

<b>FP1: Chaos and Musical Chairs</b>
The session started with widespread mechanical headaches. Valtteri Bottas spent the opening minutes fighting his front-right brakes, forcing him to alter his braking zones and inadvertently impeding Charles Leclerc. To make matters worse for the team, Sergio Perez suffered a mirroring issue on his own monoplace, struggling heavily with his front-left brake temperatures.

As the drivers fought their machinery, the two Ferrari teammates treated fans to a thrilling game of musical chairs, constantly exchanging P1 and P2. But Monaco always demands a toll. Toward the end of the session, Oliver Bearman made heavy contact with the barriers, bringing out a red flag. Thankfully, the young Brit reassured his team over the radio that he was completely okay.

Once the track went green again, the grid rushed out for final qualifying simulations, and the radio airwaves absolutely exploded.

Leclerc was the first to vent his frustration, blasting to his engineer: "These brakes are horrendous, horrendous!"

But the real drama was brewing right behind him. Lando Norris, frustrated by traffic, jumped on his radio to accuse a rival, claiming, "He totally did that on purpose." The drama immediately escalated when Lewis Hamilton caught wind of the complaints, firing back at the McLaren driver over his own team radio: "Norris exaggerated into Turn 15, trying to make it look like I was blocking him."

Monaco hasn't even reached Qualifying yet, and we already have a full-blown, three-way psychological war.

<b>Redemption for Antonelli</b>
When the checkered flag finally fell on a tumultuous hour, it was Kimi Antonelli who shocked the paddock, snatching P1 at the very death of the session. It was a massive statement of redemption for the young Italian after a miserable 2025 outing on these very streets.

With Max Verstappen lurking closely in fifth, Mercedes showing genuine pace, and Ferrari looking lethal, Saturday's Qualifying is shaping up to be an absolute, unpredictable thriller.
` 
            },
            "monaco-quali": {
                title: "Quali Summary",
                subtitle: "Everything you missed in the Saturday Qualifying sessions",
                image: "assets/images/monaco-quali.jpg", // Fixed to match your actual folder structure in image_95b1c5.jpg
                content: `<b>Q1: Q for Chaos</b>
                The unforgiving nature of Monte Carlo spared no one during the Sunday Qualifying, leaving both championship contenders and teams searching for answers in the barriers.

                For Isack Hadjar, the frustration with his machinery boiled over completely. Clearly unhappy with his team's car setup after a grueling stint on track, the Red Bull driver didn't hold back his anger over the team radio, venting: "Man, that was the worst prep ever. What are we doing?"
